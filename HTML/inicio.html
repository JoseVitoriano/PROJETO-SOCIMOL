 <body data-template-id="__page-root" class="min-h-screen w-full">
  <header data-template-id="header-section" class="canva-header shadow-sm">

  <main class="max-w-5xl mx-auto px-4 py-6"><!-- Cadastro -->

    <form id="register-form" class="grid gap-4 sm:grid-cols-2">
     <div>
        <label data-template-id="label-deposito" class="canva-text block mb-1 font-medium" for="inp-deposito">Sigla do Depósito</label>
        <input id="inp-deposito" type="text" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div>
        <label data-template-id="label-motorista" class="canva-text block mb-1 font-medium" for="inp-motorista">Nome do Motorista</label>
        <input id="inp-motorista" type="text" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div>
        <label data-template-id="label-perfil" class="canva-text block mb-1 font-medium" for="inp-perfil">Perfil do Veículo</label>        
        <select id="inp-perfil" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
            <option value="">Selecione...</option>
            <option value="3/4">3/4</option>
            <option value="Toco">Toco</option>
            <option value="Truck">Truck</option>
            <option value="Carreta">Carreta</option>
            <option value="Bi-Trem">Bi-Trem</option>
            <option value="Rodo-Trem">Rodo-Trem</option>

     <div>

     <div>
        <label data-template-id="label-data" class="canva-text block mb-1 font-medium" for="inp-data">Informe a Data de Liberação do Veículo</label>
        <input id="inp-data" type="date" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
     </div>
     <div class="flex items-end">
        <button data-template-id="btn-cadastrar" type="submit" class="canva-button w-full px-4 py-2 rounded-lg font-semibold transition hover:opacity-90">Cadastrar Carregamento</button>
     </div>

    <div id="form-feedback" class="mt-3 text-sm hidden"></div>

   </section><!-- Tabela -->
   <section id="page-tabela" class="hidden">

     <table class="w-full text-sm">

        <th class="text-left px-3 py-2">Depósito</th>
        <th class="text-left px-3 py-2">Motorista</th>
        <th class="text-left px-3 py-2">Perfil</th>
        <th class="text-left px-3 py-2">Cubagem (m³)</th>

   </section><!-- Indicadores -->
   <section id="page-indicadores" class="hidden">

      <p data-template-id="card-cubagem-label" class="canva-text text-sm opacity-70"></p>
      <p id="val-cubagem" class="text-3xl font-bold mt-1">0</p>
     </div>
     <div data-template-id="card-perfil" class="canva-card rounded-xl p-5 shadow">
      <p data-template-id="card-perfil-label" class="canva-text text-sm opacity-70"></p>
      <div id="val-perfil" class="mt-2 space-y-1 text-sm"></div>
     </div>
    </div>

  <script src="/_sdk/6740099151a06780.editing_sdk.js" integrity="sha512-eSc5OWFJjK6fUpxViOKXm5ekJ3Gp5icgygsjPVz9Xzudb9TkX/uNdpqNHc63uN0PdxYE9+g8pZAHIib0FgE0Cw=="></script>
  <script src="/_sdk/0179d719c431a79e.data_sdk.js" integrity="sha512-OsRvJkI5GkC3MJQcgotQYotpzrMSX415GiKKgvYdxQEEkzD/fdchShO2FMSy0PJr/tiINMXOk5Vl2zAgg6bUiA=="></script>
  <script>
        let allData = [];

        function showTab(name) {
            ['cadastro','tabela','indicadores'].forEach(t => {
                document.getElementById('page-' + t).classList.toggle('hidden', t !== name);
                document.getElementById('tab-' + t).classList.toggle('tab-active', t === name);
            });
            if (name === 'indicadores') renderIndicators();
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            const empty = document.getElementById('empty-table');
            if (!data.length) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');

            const existing = new Map([...tbody.children].map(r => [r.dataset.id, r]));
            const fragment = document.createDocumentFragment();

            data.forEach(item => {
                let row = existing.get(item.__backendId);
                if (row) {
                    existing.delete(item.__backendId);
                } else {
                    row = document.createElement('tr');
                    row.dataset.id = item.__backendId;
                    row.className = 'border-t';
                    row.innerHTML = `<td class="px-3 py-2"></td><td class="px-3 py-2"></td><td class="px-3 py-2"></td><td class="px-3 py-2"></td><td class="px-3 py-2"></td><td class="px-3 py-2 text-center"><button class="text-red-500 hover:text-red-700" title="Excluir"><i data-lucide="trash-2" style="width:16px;height:16px"></i></button></td>`;
                }
                const cells = row.querySelectorAll('td');
                cells[0].textContent = item.deposito;
                cells[1].textContent = item.motorista;
                cells[2].textContent = item.perfil_veiculo;
                cells[3].textContent = Number(item.cubagem).toFixed(2);
                cells[4].textContent = item.data_liberacao ? new Date(item.data_liberacao).toLocaleDateString('pt-BR') : '';
                cells[5].querySelector('button').onclick = () => deleteRecord(item);
                fragment.appendChild(row);
            });
            existing.forEach(r => r.remove());
            tbody.appendChild(fragment);
            lucide.createIcons();
        }

        function renderIndicators() {
            document.getElementById('val-total').textContent = allData.length;
            const avg = allData.length ? (allData.reduce((s, r) => s + Number(r.cubagem || 0), 0) / allData.length).toFixed(2) : '0';
            document.getElementById('val-cubagem').textContent = avg + ' m³';
            const perfis = {};
            allData.forEach(r => { perfis[r.perfil_veiculo] = (perfis[r.perfil_veiculo] || 0) + 1; });
            document.getElementById('val-perfil').innerHTML = Object.entries(perfis).map(([k,v]) => `<div class="flex justify-between"><span>${k}</span><span class="font-semibold">${v}</span></div>`).join('');
        }

        async function deleteRecord(item) {
            const result = await window.dataSdk.delete(item);
            if (!result.isOk) showFeedback('Erro ao excluir registro.', true);
        }

        function showFeedback(msg, isError) {
            const el = document.getElementById('form-feedback');
            el.textContent = msg;
            el.className = 'mt-3 text-sm ' + (isError ? 'text-red-600' : 'text-green-600');
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (allData.length >= 999) { showFeedback('Limite de 999 registros atingido.', true); return; }
            const btn = document.querySelector('[data-template-id="btn-cadastrar"]');
            btn.disabled = true; btn.style.opacity = '0.5';
            const record = {
                deposito: document.getElementById('inp-deposito').value.trim(),
                motorista: document.getElementById('inp-motorista').value.trim(),
                perfil_veiculo: document.getElementById('inp-perfil').value,
                cubagem: parseFloat(document.getElementById('inp-cubagem').value),
                data_liberacao: new Date(document.getElementById('inp-data').value).toISOString()
            };
            const result = await window.dataSdk.create(record);
            btn.disabled = false; btn.style.opacity = '1';
            if (result.isOk) { e.target.reset(); showFeedback('Registro salvo com sucesso!', false); }
            else showFeedback('Erro ao salvar registro.', true);
        });

        const handler = {
            onDataChanged(data) {
                allData = data;
                renderTable(data);
                if (!document.getElementById('page-indicadores').classList.contains('hidden')) renderIndicators();
            }
        };

        (async () => {
            const r = await window.dataSdk.init(handler);
            if (!r.isOk) showFeedback('Erro ao conectar com o banco de dados.', true);
            lucide.createIcons();
        })();
    </script>
