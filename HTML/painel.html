<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabela de Cadastros</title>
  <link rel="stylesheet" href="../CSS/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Tabela de Cadastros</h1>
    <nav>
      <a href="../HTML/inicio.html">Cadastro</a>
      <a href="../HTML/painel.html">Tabela</a>
      <a href="../HTML/indicadores.html">Indicadores</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>Registros cadastrados</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Depósito</th>
              <th>Motorista</th>
              <th>Perfil do veículo</th>
              <th>Cubagem</th>
              <th>Data conclusão</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbodyCadastro"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../JAVASCRIPT/script.js"></script>
</body>
</html>
