<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Carregos da Socimol</title>
</head>
<body>
  <header data-template-id="header-section" class="canva-header shadow-sm">
   <div class="max-w-5xl mx-auto px-4 py-4">
    <h1 data-template-id="app-title" class="canva-text text-2xl font-bold">Carregamentos Socimol</h1>
   </div>
  </header>

  <div class="container">
        <nav>
            <ul>
                <li><a href="#" target="_self">Home</a></li>
                <li><a href="#" target="_self">Cadastro</a></li>
                <li><a href="#" target="_self">Painel</a></li>
                <li><a href="#" target="_self">Indicadores</a></li>
                <li><a href="#" target="_self">Sobre nós</a></li>
            </ul>
        </nav>
    </div>

</section><!-- Tabela -->
   <section id="page-tabela" class="hidden">
    <h2 data-template-id="table-title" class="canva-text text-xl font-semibold mb-4"></h2>
    <div class="overflow-x-auto rounded-lg border">
     <table class="w-full text-sm">
      <thead data-template-id="table-header" class="canva-section">
       <tr>
        <th class="text-left px-3 py-2">Depósito</th>
        <th class="text-left px-3 py-2">Motorista</th>
        <th class="text-left px-3 py-2">Perfil</th>
        <th class="text-left px-3 py-2">Cubagem (m³)</th>
        <th class="text-left px-3 py-2">Data Liberação</th>
        <th class="px-3 py-2"></th>
       </tr>
      </thead>
      <tbody id="table-body"></tbody>
     </table>
    </div>
    <p data-template-id="empty-table" id="empty-table" class="canva-text text-center py-8 hidden"></p>
</section>
    
</body>
</html>
